name: Release SY STORE

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'true'

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Compile SY STORE
        run: | 
          # تصحيح ذكي: تغيير إصدارات iOS و tvOS فقط إلى 15
          find . -name "Package.swift" -exec sed -i '' 's/\.iOS(\.v16)/\.iOS(\.v15)/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.tvOS(\.v16)/\.tvOS(\.v15)/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.iOS(\.v14)/\.iOS(\.v15)/g' {} + || true
          
          # تصحيح مشكلة الماك التي أوقفت البناء (إرجاعها لإصدار 13 المستقر)
          find . -name "Package.swift" -exec sed -i '' 's/\.macOS(\.v16)/\.macOS(\.v13)/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.macOS(\.v15)/\.macOS(\.v13)/g' {} + || true
          
          # تحديث رقم البناء
          agvtool new-version -all $(git rev-parse HEAD)
          
          # بدء التجميع
          make
          mkdir upload
          mv packages/* upload/

      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SY STORE v${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          files: |
            upload/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
