name: Release SY STORE

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'true'

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Compile SY STORE
        run: | 
          # 1. توحيد إصدارات iOS إلى 15
          find . -name "Package.swift" -exec sed -i '' 's/\.v16/\.v15/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.v14/\.v15/g' {} + || true
          find . -name "Package.swift" -exec sed -i '' 's/\.v12/\.v15/g' {} + || true
          
          # 2. حل مشكلة رابط مكتبة IDeviceKitten المكسور (تحديث إلى v0.1.62)
          echo "جاري تحميل التحديث الجديد للمكتبة لاستخراج البصمة..."
          NEW_URL="https://github.com/jkcoxson/idevice/releases/download/v0.1.62/idevice-xcframework-v0.1.62.zip"
          curl -sL -o idevice.zip $NEW_URL
          NEW_CHECKSUM=$(shasum -a 256 idevice.zip | awk '{print $1}')
          rm idevice.zip
          
          echo "جاري ترقيع (Patch) ملف IDeviceKitten..."
          # استبدال الرابط القديم بالجديد
          sed -i '' "s|https://github.com/jkcoxson/idevice/releases/download/v0.1.57/IDevice.xcframework.zip|$NEW_URL|g" IDeviceKitten/Package.swift || true
          # استبدال البصمة (Checksum) القديمة بالبصمة الجديدة
          sed -i '' -E "s/checksum:[[:space:]]*\"[^\"]*\"/checksum: \"$NEW_CHECKSUM\"/g" IDeviceKitten/Package.swift || true
          
          # 3. تحديث رقم البناء والتجميع
          agvtool new-version -all $(git rev-parse HEAD)
          make
          mkdir upload
          mv packages/* upload/

      - name: Extract Version
        id: get_version
        run: |
          # إنشاء رقم إصدار يعتمد على التاريخ والـ Commit
          VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SY STORE v${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          files: |
            upload/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
